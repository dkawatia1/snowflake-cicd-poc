name: Snowflake CLI Deploy POC

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # Required to securely hand off tokens to Snowflake
  contents: read    # Required to read repository files

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # Triggers the specific OIDC security rules

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v1
        with:
          use-oidc: true
          default-config-file-path: "config.toml"
        env:
          SNOWFLAKE_CONNECTIONS_POC_CONN_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_CONNECTIONS_POC_CONN_TOKEN: ${{ env.SNOWFLAKE_TOKEN }}

      - name: Test Snowflake Connection
        run: snow connection test

      - name: Execute Deploy Script
        run: snow sql -f ./scripts/V1.1__setup_tables.sql
