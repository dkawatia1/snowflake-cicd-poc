name: Snowflake Multi-Environment Deploy

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  # ----------------------------------------------------
  # DEV STAGE
  # ----------------------------------------------------
  deploy-dev:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.CICD_USER }}
      SNOWFLAKE_DATABASE: ${{ vars.TARGET_DB }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install schemachange
        run: pip install schemachange

      - name: Deploy Migrations to Dev
        run: |
          schemachange deploy \
            -f migrations \
            -a "$SNOWFLAKE_ACCOUNT" \
            -u "$SNOWFLAKE_USER" \
            -d "$SNOWFLAKE_DATABASE" \
            -c METADATA.SCHEMACHANGE.CHANGE_HISTORY \
            --create-change-history-table
            --authenticator oauth          # <--- Explicitly tells schemachange to use the OIDC token
        env:
          SNOWFLAKE_PASSWORD: ${{ env.SNOWFLAKE_TOKEN }} # Seamless passwordless OIDC routing

  # ----------------------------------------------------
  # UAT STAGE
  # ----------------------------------------------------
  deploy-uat:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: uat
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.CICD_USER }}
      SNOWFLAKE_DATABASE: ${{ vars.TARGET_DB }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install schemachange
        run: pip install schemachange

      - name: Deploy Migrations to UAT
        run: |
          schemachange deploy \
            -f migrations \
            -a "$SNOWFLAKE_ACCOUNT" \
            -u "$SNOWFLAKE_USER" \
            -d "$SNOWFLAKE_DATABASE" \
            -c METADATA.SCHEMACHANGE.CHANGE_HISTORY \
            --create-change-history-table
            --authenticator oauth          # <--- Explicitly tells schemachange to use the OIDC token
        env:
          SNOWFLAKE_PASSWORD: ${{ env.SNOWFLAKE_TOKEN }}

  # ----------------------------------------------------
  # PROD STAGE
  # ----------------------------------------------------
  deploy-prod:
    needs: deploy-uat
    runs-on: ubuntu-latest
    environment: production
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.CICD_USER }}
      SNOWFLAKE_DATABASE: ${{ vars.TARGET_DB }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install schemachange
        run: pip install schemachange

      - name: Deploy Migrations to Prod
        run: |
          schemachange deploy \
            -f migrations \
            -a "$SNOWFLAKE_ACCOUNT" \
            -u "$SNOWFLAKE_USER" \
            -d "$SNOWFLAKE_DATABASE" \
            -c METADATA.SCHEMACHANGE.CHANGE_HISTORY \
            --create-change-history-table
            --authenticator oauth          # <--- Explicitly tells schemachange to use the OIDC token
        env:
          SNOWFLAKE_PASSWORD: ${{ env.SNOWFLAKE_TOKEN }}
