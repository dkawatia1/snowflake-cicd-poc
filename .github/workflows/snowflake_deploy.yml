name: Snowflake Multi-Environment Deploy

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  # ----------------------------------------------------
  # DEV STAGE
  # ----------------------------------------------------
  deploy-dev:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.CICD_USER }}
      SNOWFLAKE_DATABASE: ${{ vars.TARGET_DB }}
      SNOWFLAKE_ROLE: DEV_CICD_ROLE
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install schemachange
        run: pip install schemachange

      - name: Setup Snowflake CLI (Generates OIDC Token)
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          use-oidc: true

      - name: Generate Temporary Connection Config
        run: |
          mkdir -p ~/.snowflake
          cat <<EOF > ~/.snowflake/connections.toml
          [default]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          database = "$SNOWFLAKE_DATABASE"
          role = "$SNOWFLAKE_ROLE"
          warehouse = "COMPUTE_WH"
          authenticator = "oauth"
          token = "$SNOWFLAKE_TOKEN"
          EOF
        env:
          SNOWFLAKE_TOKEN: ${{ env.SNOWFLAKE_TOKEN }}

      - name: Deploy Migrations to Dev
        run: |
          schemachange deploy \
            -f migrations \
            -c METADATA.SCHEMACHANGE.CHANGE_HISTORY \
            --create-change-history-table \
            --connection-name default

  # ----------------------------------------------------
  # UAT STAGE
  # ----------------------------------------------------
  deploy-uat:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: uat
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.CICD_USER }}
      SNOWFLAKE_DATABASE: ${{ vars.TARGET_DB }}
      SNOWFLAKE_ROLE: UAT_CICD_ROLE
      warehouse = "COMPUTE_WH"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install schemachange
        run: pip install schemachange

      - name: Setup Snowflake CLI (Generates OIDC Token)
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          use-oidc: true

      - name: Generate Temporary Connection Config
        run: |
          mkdir -p ~/.snowflake
          cat <<EOF > ~/.snowflake/connections.toml
          [default]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          database = "$SNOWFLAKE_DATABASE"
          role = "$SNOWFLAKE_ROLE"
          authenticator = "oauth"
          token = "$SNOWFLAKE_TOKEN"
          EOF
        env:
          SNOWFLAKE_TOKEN: ${{ env.SNOWFLAKE_TOKEN }}

      - name: Deploy Migrations to UAT
        run: |
          schemachange deploy \
            -f migrations \
            -c METADATA.SCHEMACHANGE.CHANGE_HISTORY \
            --create-change-history-table \
            --connection-name default

  # ----------------------------------------------------
  # PROD STAGE
  # ----------------------------------------------------
  deploy-prod:
    needs: deploy-uat
    runs-on: ubuntu-latest
    environment: production
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.CICD_USER }}
      SNOWFLAKE_DATABASE: ${{ vars.TARGET_DB }}
      SNOWFLAKE_ROLE: PROD_CICD_ROLE
      warehouse = "COMPUTE_WH"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install schemachange
        run: pip install schemachange

      - name: Setup Snowflake CLI (Generates OIDC Token)
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          use-oidc: true

      - name: Generate Temporary Connection Config
        run: |
          mkdir -p ~/.snowflake
          cat <<EOF > ~/.snowflake/connections.toml
          [default]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          database = "$SNOWFLAKE_DATABASE"
          role = "$SNOWFLAKE_ROLE"
          authenticator = "oauth"
          token = "$SNOWFLAKE_TOKEN"
          EOF
        env:
          SNOWFLAKE_TOKEN: ${{ env.SNOWFLAKE_TOKEN }}

      - name: Deploy Migrations to Prod
        run: |
          schemachange deploy \
            -f migrations \
            -c METADATA.SCHEMACHANGE.CHANGE_HISTORY \
            --create-change-history-table \
            --connection-name default
